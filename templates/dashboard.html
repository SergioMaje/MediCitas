{% extends "base.html" %}

{% block title %}Dashboard - Medicitas{% endblock %}

{% block content %}
<h2>Dashboard</h2>
<div class="row mt-3">
    <div class="col-md-4">
        <div class="card text-white bg-primary mb-3">
            <div class="card-body">
                <h5 class="card-title">Total Pacientes</h5>
                <p class="card-text display-6">{{ total_pacientes }}</p>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-white bg-success mb-3">
            <div class="card-body">
                <h5 class="card-title">Citas Hoy</h5>
                <p class="card-text display-6">{{ citas_hoy }}</p>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-white bg-warning mb-3">
            <div class="card-body">
                <h5 class="card-title">Proximas 24h</h5>
                <p class="card-text display-6">{{ citas_proximas }}</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
